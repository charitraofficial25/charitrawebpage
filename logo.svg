<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" fill="#E8DDD5"/>
  
  <!-- Decorative frame -->
  <rect x="20" y="20" width="460" height="460" fill="none" stroke="#D9CEC3" stroke-width="2"/>
  
  <!-- Lotus Flower - Upper Section -->
  <!-- Outer petals (6 petals) -->
  <g id="outer-petal-1">
    <path d="M 250 80 Q 270 120 265 160 Q 260 140 250 130 Q 240 140 235 160 Q 230 120 250 80" fill="#E8DDD5" stroke="#6B5344" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Petal 1 (top) -->
  <ellipse cx="250" cy="100" rx="18" ry="40" fill="none" stroke="#6B5344" stroke-width="2.5"/>
  
  <!-- Petal 2 (top-right) -->
  <ellipse cx="297" cy="125" rx="18" ry="40" fill="none" stroke="#6B5344" stroke-width="2.5" transform="rotate(60 297 125)"/>
  
  <!-- Petal 3 (bottom-right) -->
  <ellipse cx="297" cy="225" rx="18" ry="40" fill="none" stroke="#6B5344" stroke-width="2.5" transform="rotate(120 297 225)"/>
  
  <!-- Petal 4 (bottom) -->
  <ellipse cx="250" cy="250" rx="18" ry="40" fill="none" stroke="#6B5344" stroke-width="2.5" transform="rotate(180 250 250)"/>
  
  <!-- Petal 5 (bottom-left) -->
  <ellipse cx="203" cy="225" rx="18" ry="40" fill="none" stroke="#6B5344" stroke-width="2.5" transform="rotate(240 203 225)"/>
  
  <!-- Petal 6 (top-left) -->
  <ellipse cx="203" cy="125" rx="18" ry="40" fill="none" stroke="#6B5344" stroke-width="2.5" transform="rotate(300 203 125)"/>
  
  <!-- Inner petals (smaller) -->
  <!-- Inner Petal 1 (top) -->
  <ellipse cx="250" cy="120" rx="14" ry="32" fill="none" stroke="#6B5344" stroke-width="2" opacity="0.7"/>
  
  <!-- Inner Petal 2 (top-right) -->
  <ellipse cx="282" cy="145" rx="14" ry="32" fill="none" stroke="#6B5344" stroke-width="2" opacity="0.7" transform="rotate(60 282 145)"/>
  
  <!-- Inner Petal 3 (bottom-right) -->
  <ellipse cx="282" cy="205" rx="14" ry="32" fill="none" stroke="#6B5344" stroke-width="2" opacity="0.7" transform="rotate(120 282 205)"/>
  
  <!-- Inner Petal 4 (bottom) -->
  <ellipse cx="250" cy="230" rx="14" ry="32" fill="none" stroke="#6B5344" stroke-width="2" opacity="0.7" transform="rotate(180 250 230)"/>
  
  <!-- Inner Petal 5 (bottom-left) -->
  <ellipse cx="218" cy="205" rx="14" ry="32" fill="none" stroke="#6B5344" stroke-width="2" opacity="0.7" transform="rotate(240 218 205)"/>
  
  <!-- Inner Petal 6 (top-left) -->
  <ellipse cx="218" cy="145" rx="14" ry="32" fill="none" stroke="#6B5344" stroke-width="2" opacity="0.7" transform="rotate(300 218 145)"/>
  
  <!-- Center stamen circle -->
  <circle cx="250" cy="175" r="22" fill="#C9A876" opacity="0.7"/>
  <circle cx="250" cy="175" r="22" fill="none" stroke="#6B5344" stroke-width="2.5"/>
  
  <!-- Inner center detail -->
  <circle cx="250" cy="175" r="12" fill="#6B5344" opacity="0.4"/>
  
  <!-- Brand Text -->
  <!-- CHARITRA Text -->
  <text x="250" y="340" font-family="Georgia, serif" font-size="72" font-weight="700" text-anchor="middle" fill="#6B5344" letter-spacing="4">CHARITRA</text>
  
  <!-- Decorative underline -->
  <line x1="100" y1="360" x2="400" y2="360" stroke="#C9A876" stroke-width="2"/>
  
  <!-- Tagline -->
  <text x="250" y="410" font-family="Georgia, serif" font-size="18" text-anchor="middle" fill="#6B5344" opacity="0.8" letter-spacing="2">HANDMADE ELEGANCE</text>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="5" fill="#C9A876" opacity="0.6"/>
  <circle cx="470" cy="30" r="5" fill="#C9A876" opacity="0.6"/>
  <circle cx="30" cy="470" r="5" fill="#C9A876" opacity="0.6"/>
  <circle cx="470" cy="470" r="5" fill="#C9A876" opacity="0.6"/>
</svg>
