<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#E8DDD5"/>
  
  <!-- Lotus Flower -->
  <!-- Outer petals -->
  <ellipse cx="100" cy="60" rx="12" ry="20" fill="none" stroke="#6B5344" stroke-width="1.5"/>
  <ellipse cx="130" cy="70" rx="12" ry="20" fill="none" stroke="#6B5344" stroke-width="1.5" transform="rotate(60 100 60)"/>
  <ellipse cx="130" cy="110" rx="12" ry="20" fill="none" stroke="#6B5344" stroke-width="1.5" transform="rotate(120 100 60)"/>
  
  <!-- Inner petals -->
  <ellipse cx="100" cy="75" rx="10" ry="16" fill="none" stroke="#6B5344" stroke-width="1.5"/>
  <ellipse cx="122" cy="88" rx="10" ry="16" fill="none" stroke="#6B5344" stroke-width="1.5" transform="rotate(60 100 75)"/>
  <ellipse cx="122" cy="115" rx="10" ry="16" fill="none" stroke="#6B5344" stroke-width="1.5" transform="rotate(120 100 75)"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="90" r="8" fill="#C9A876" opacity="0.6"/>
  <circle cx="100" cy="90" r="8" fill="none" stroke="#6B5344" stroke-width="1"/>
</svg>
